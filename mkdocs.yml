site_name: Palqee Prisma Cookbooks
site_description: Practical guides for validating LLM applications with the Prisma AI SDK
site_url: https://palqee.github.io/prisma-cookbooks

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Detect Hallucinations in RAG: rag-hallucination-detection.md
  - Automated QA for Call Centers: call-center-qa.md
  - Custom Policy Evaluators: custom-policy-evaluators.md
  - CI/CD Quality Gates: cicd-quality-gates.md
  - Real-Time Production Evaluation: realtime-production-evaluation.md
  - Human-in-the-Loop Feedback: hitl-feedback-loop.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
