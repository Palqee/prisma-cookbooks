site_name: Palqee Prisma Cookbooks
site_description: Practical guides for transforming human-review workflows with the Prisma AI SDK
site_url: https://palqee.github.io/prisma-cookbooks

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Evaluating Contact Center Agents: contact-center-agents.md
  - Building Policy-Based Metrics: policy-based-metrics.md
  - Human Review & Evaluation Memory: human-review.md
  - Real-Time Policy Monitoring: realtime-policy-monitoring.md
  - Policy Compliance in CI/CD: cicd-policy-compliance.md
  - AI Performance Metrics: ai-performance-metrics.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
